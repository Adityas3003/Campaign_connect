<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <!-- favicon -->
    <link rel="icon" href="https://yt3.ggpht.com/a/AGF-l78km1YyNXmF0r3-0CycCA0HLA_i6zYn_8NZEg=s900-c-k-c0xffffffff-no-rj-mo" type="image/gif" sizes="16x16">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
        body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: white;
    font-family: Arial, sans-serif;
}

.log{
    position: relative;
    left: 100px;
    top: 10px;
    object-fit: cover;
    height: 600px;
    width: 500px;
}

i{
    font-size: 30px;
    position: absolute;
    right: 180px;
    top: 70px;
    color: rgb(72, 72, 237);
}

.content{
    display: flex;
    box-shadow: 0 0 10px black;
    width: 80%;
    height: 650px;
}

.login-container {
    position: relative;
    top: 120px;
    left: 200px;
    padding: 20px;
    border-radius: 5px;
}

.login-container p{
    color: grey;
}

.login-container h1 {
    margin-bottom: 20px;
    margin-top: -10px;
    font-size: 24px;
}

.login-container input {
    width: 350px;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ccc;
    background-color: #e3e3e3;
    border-radius: 5px;
    color: rgb(72, 72, 237);
}

.login-container button {
    width: 85%;
            padding: 12px;
            background: linear-gradient(90deg, #fc5711, #8224e3);
            border: none;
            color: white;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
    height: 45px;
    width: 370px;
    font-size: 20px;
}

.login-container button:hover {
    background: linear-gradient(90deg, #8224e3, #fc5711);
}

.login-container.block{
    display :none
}

.forgotBlock{
    position: absolute;
    right: 300px;
    top: 140px;
    display: none;
}
.forgotBlock.visible{
    display: block;
}

.forgotBlock input{
    width: 350px;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ccc;
    background-color: #e3e3e3;
    border-radius: 5px;
    color: rgb(72, 72, 237);
}

.forgotBlock button{
    width: 85%;
            padding: 12px;
            background: linear-gradient(90deg, #fc5711, #8224e3);
            border: none;
            color: white;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
    height: 45px;
    width: 370px;
    font-size: 20px;
}

.forgotBlock button:hover{
    background: linear-gradient(90deg, #8224e3, #fc5711);
}

.forgotBlock h1{
    font-size: 24px;
}

.forgotBlock p{
    color: grey;
    margin-bottom: -10px;
    position: relative;
    left: 2px;
}

    </style>
  </head>
  <body>
    <div class="content">
      <a href="index.html">
        <i class="fa fa-home" aria-hidden="true"></i>
      </a>
      <div class="login-img">
        <img class="log" src="https://i.pinimg.com/736x/6b/1b/22/6b1b22573f9f3d4bba11a9fa5cb45652.jpg" />
      </div>

      <div class="login-container">
        <p>Welcome back!</p>
        <h1>Login to your account</h1>
        <form>
          <label>Email :</label><br />
          <input
            type="email"
            placeholder="Please enter your email"
            required
          /><br />
          <label>Password :</label><br />
          <input type="password" placeholder="Enter Password" required /><br />
          <button type="submit">Login</button><br />
          <p>Don't have an account? <a href="#" class="forgot-pass">Forgot Password?</a> </p>

        </form>
      </div>
      
      <div class="forgotBlock">
        <p>Welcome!!</p>
        <h1>Get a new password</h1>
        <label>Email :</label><br>
        <input type="email" name="email" placeholder="Email.." required><br><br>

        <label>New Password :</label><br>
        <input type="password" name="password" placeholder="New Password.." required><br><br>

        <label>Confirm Password :</label><br>
        <input type="password" name="password" placeholder="Re-enter Password" required><br>

        <button type="submit" class="forSub">Submit</button>
      </div>
      
    </div>

    <script src="login.js"></script>
  </body>
</html>
