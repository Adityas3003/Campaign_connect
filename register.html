<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <!-- favicon -->
  <link rel="icon" href="https://yt3.ggpht.com/a/AGF-l78km1YyNXmF0r3-0CycCA0HLA_i6zYn_8NZEg=s900-c-k-c0xffffffff-no-rj-mo" type="image/gif" sizes="16x16">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        body {
    font-family: Arial, sans-serif;
}

.container {
    position: relative;
    top: 0px;
    width: 1000px;
    height: 600px;
    margin: 50px auto;
    padding: 20px;
    background-color: #fff;
    border: 1px solid #ddd;
    border-radius: 10px;
    box-shadow: 0 0 10px black;
    display: flex;
}

.container p{
    color: grey;
}

.container h1{
    position: relative;
    font-size: 24px;
}

.left {
    width: 50%;
    padding: 20px;
    position: relative;
    top: 70px;
    left: 20px;
}

.right {
    width: 50%;
    padding: 20px;
}

input[type="text"], input[type="email"], input[type="password"] {
    width: 80%;
    height: 25px;
    padding: 10px;
    border: none;
    margin-bottom: 20px;
    color: rgb(72, 72, 237);
    background-color: #e3e3e3;
    border-radius: 5px;
}

button[type="submit"] {
    width: 85%;
    height: 40px;
    width: 85%;
            padding: 12px;
            background: linear-gradient(90deg, #fc5711, #8224e3);
            border: none;
            color: white;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
    font-size: 20px;
}
button:hover{
    background: linear-gradient(90deg, #8224e3, #fc5711);
}

i{
    font-size: 30px;
    position: absolute;
    left: 30px;
    top: 20px;
    color: rgb(72, 72, 237);
}

.container img{
    position: relative;
    left: -10px;
    top: -20px;
    object-fit: cover;
    height: 600px;
    width: 500px;
}
.redirect{
    display: block;
    color: blue;
    text-decoration: underline;
    position: relative;
    left: 0px;
}
.log-box{
    display: flex;
    justify-content: left;
    align-items: center;
    gap: 10px;
}
    </style>
</head>

<body>
  <div class="container">
    <a href="index.html">
      <i class="fa fa-home" aria-hidden="true"></i>
    </a>
    <div class="left">
      <p>Welcome!</p>
      <h1>Register Yourself.</h1>
      <form id="register-form" action="">
        <input type="text" id="username" name="username" placeholder="Username" required/>
        <input type="email" id="email" name="email" placeholder="Email" required/>
        <input type="password" id="password" name="password" placeholder="Password" required/>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm Password" required/>

        <!-- <a href="log.html"> -->
        <button type="submit">REGISTER</button>
        <!-- </a> -->
        <div class="log-box">
          <!-- <div class="log-box1"> -->
            <p>Already have an account</p>
          <!-- </div> -->
          
         <a href="login.html" class="redirect">LOGIN</a>
        </div>
      </form>
    </div>

    <div class="right">
      <img src="https://i.pinimg.com/736x/6b/1b/22/6b1b22573f9f3d4bba11a9fa5cb45652.jpg" alt="Image" />
    </div>
  </div>
  <script>
    let u = document.querySelector("#username");
    let e = document.querySelector("#email");
    let p = document.querySelector("#password");
    let cp = document.querySelector("#confirm-password");

    if(u.innerHTML = ""){
      alert("enter something!!!");
    }
  </script>
</body>

</html>
